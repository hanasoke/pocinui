<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bimbel Pocinui - Kursus Belajar Cerdas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <style>
        :root {
            --primary-orange: #f59e0b;
            --dark-orange: #d97706;
            --light-orange: #fed7aa;
            --accent-blue: #3b82f6;
            --bg-light: #f8fafc;
        }
        body { 
            font-family: 'Poppins', -apple-system, sans-serif; 
            line-height: 1.7;
        }
        .navbar { 
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .hero-section {
            background: linear-gradient(135deg, var(--primary-orange), var(--dark-orange));
            color: white;
            padding: 120px 0 80px;
            position: relative;
            overflow: hidden;
        }
        .hero-character {
            position: absolute;
            right: 10%;
            top: 20%;
            width: 300px;
            height: 300px;
            background: url('pocinui.jpg') no-repeat center;
            background-size: contain;
            z-index: 2;
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        .guru-card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(245,158,11,0.15);
            transition: all 0.4s ease;
            height: 100%;
        }
        .guru-card:hover {
            transform: translateY(-12px);
            box-shadow: 0 25px 50px rgba(245,158,11,0.25);
        }
        .testimonial-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-left: 6px solid var(--primary-orange);
        }
        .gallery-grid img {
            border-radius: 15px;
            transition: transform 0.4s ease;
            height: 250px;
            object-fit: cover;
        }
        .gallery-grid img:hover {
            transform: scale(1.05);
        }
        .section-padding { padding: 90px 0; }
        .btn-primary-custom {
            background: linear-gradient(45deg, var(--primary-orange), var(--dark-orange));
            border: none;
            border-radius: 50px;
            padding: 12px 30px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-primary-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(245,158,11,0.4);
        }
    </style>
</head>
<body>
  <app-root></app-root>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
